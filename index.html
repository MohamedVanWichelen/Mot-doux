<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affirmations Positives</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Poppins", sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background: linear-gradient(135deg, #f7e9e7, #fffaf6, #f0d8c9);
      color:#4a2f3e;
    }

    .container{
      width:90%;
      max-width:500px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,250,246,0.9);
      backdrop-filter:blur(12px);
      text-align:center;
      box-shadow:0 15px 50px rgba(140, 86, 117, 0.18);
      animation:fadeIn 1s ease;
    }

    h1{
      font-size:2rem;
      margin-bottom:20px;
    }

    p{
      opacity:0.8;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:15px;
      background:rgba(255,255,255,0.7);
      color:#4a2f3e;
      font-size:1rem;
      margin-bottom:20px;
    }

    input::placeholder{
      color:rgba(74,47,62,0.55);
    }

    button{
      padding:15px 25px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg, #f3c6d0, #fbe8d9);
      color:#5f3249;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 10px 25px rgba(159, 95, 116, 0.15);
    }

    button:hover{
      transform:scale(1.05);
      background:linear-gradient(135deg, #f7d2dc, #ffefe4);
    }

    .affirmation{
      position:fixed;
      padding:18px 28px;
      border-radius:20px;
      background:rgba(255,247,242,0.95);
      backdrop-filter:blur(10px);
      color:#5a3c4d;
      font-size:1.1rem;
      pointer-events:none;
      animation:popup 3s forwards;
      box-shadow:0 10px 30px rgba(139, 82, 109, 0.18);
    }

    @keyframes popup{
      0%{
        opacity:0;
        transform:translateY(20px) scale(0.8);
      }
      15%{
        opacity:1;
        transform:translateY(0) scale(1);
      }
      80%{
        opacity:1;
      }
      100%{
        opacity:0;
        transform:translateY(-20px) scale(0.9);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .hidden{
      display:none;
    }

    #mainZone{
      margin-top:20px;
    }

    .clickText{
      margin-top:20px;
      font-size:0.95rem;
      opacity:0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌸 Affirmations Positives</h1>

    <div id="formZone">
      <p>Entre ton prénom pour commencer ✨</p>

      <input type="text" id="prenom" placeholder="Ton prénom..." />

      <button onclick="commencer()">Valider</button>
    </div>

    <div id="mainZone" class="hidden">
      <h2 id="welcome"></h2>
      <p class="clickText">
        Clique n'importe où sur l'écran 💜
      </p>
    </div>
  </div>

  <script>
    let prenomUtilisateur = "";

    const affirmations = [
      "Tu es capable de grandes choses ✨",
      "Tu mérites le bonheur 💜",
      "Tu progresses chaque jour 🌸",
      "Tu es plus fort que tu ne le crois 🌟",
      "Ton énergie est précieuse ☀️",
      "Tu peux être fier de toi 💫",
      "Tu apportes quelque chose d'unique 🌈",
      "Tu as le droit de rêver grand 🚀",
      "Tu illumines plus que tu ne l'imagines 🌷",
      "Continue, tu avances vraiment 💖"
    ];

    function commencer(){
      const input = document.getElementById("prenom");

      if(input.value.trim() === ""){
        alert("Entre un prénom ✨");
        return;
      }

      prenomUtilisateur = input.value;

      document.getElementById("formZone").classList.add("hidden");
      document.getElementById("mainZone").classList.remove("hidden");

      document.getElementById("welcome").innerHTML =
        "Bienvenue " + prenomUtilisateur + " 💜";
    }

    document.addEventListener("click", function(e){

      if(document.getElementById("mainZone").classList.contains("hidden"))
        return;

      const affirmation =
        affirmations[Math.floor(Math.random() * affirmations.length)];

      const bubble = document.createElement("div");

      bubble.className = "affirmation";

      bubble.innerHTML = affirmation;

      bubble.style.left = e.clientX + "px";
      bubble.style.top = e.clientY + "px";

      document.body.appendChild(bubble);

      setTimeout(() => {
        bubble.remove();
      }, 3000);
    });
  </script>

</body>
</html>
